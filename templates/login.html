{% extends "base.html" %}

{% block content %}
<h1>Admin Login</h1>

<form method="POST" class="form-box small-form">
    <label>Username</label>
    <input type="text" name="username" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <button type="submit">Login</button>
</form>
{% endblock %}
